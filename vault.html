<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Catalyst | Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="theme-color" content="#1a1209">
        <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --bg: #080808;
            --card: #111111;
            --accent: linear-gradient(135deg, #00ff87 0%, #00b4d8 100%);
            --accent-solid: #00ff87;
            --text-p: #f5f5f5;
            --text-s: #666666;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text-p);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding: 40px 24px calc(100px + var(--safe-bottom)); 
        }

        header { width: 100%; margin-bottom: 30px; text-align: center; }
        .logo { font-size: 0.55rem; letter-spacing: 5px; color: var(--text-s); text-transform: uppercase; margin-bottom: 6px; }
        h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }

        /* Vault Stats */
        .vault-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.8rem;
            color: var(--text-s);
            font-weight: 600;
        }

        /* The Grid */
        .vault-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        /* Vault Cards */
        .vault-card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tag {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-solid);
            font-weight: 700;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: #ff4757;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 5px;
        }

        .concept {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .explanation {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: #aaaaaa;
            line-height: 1.5;
            padding-top: 10px;
            border-top: 1px dashed rgba(255,255,255,0.05);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-s);
        }

        .empty-state h3 { color: var(--text-p); margin-bottom: 10px; }
        .empty-state p { font-size: 0.85rem; line-height: 1.5; margin-bottom: 20px; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent-solid);
            color: var(--accent-solid);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
        }

        /* Bottom Tab Bar */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(15px);
            padding: 16px 32px calc(12px + var(--safe-bottom));
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }
        /* System Footer */
        .sys-footer {
            width: 100%;
            text-align: center;
            padding: 40px 0 10px;
            margin-top: auto; /* Pushes it to the bottom of the flex container */
            font-size: 0.55rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: var(--text-s);
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.5;
        }


        .nav-item { color: var(--text-s); text-decoration: none; font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        .nav-item.active { color: #00ff87; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Neural Link</div>
        <h1>The Vault</h1>
    </header>

    <div class="vault-stats">
        <span>Total Cards: <span id="total-count" style="color:#fff;">0</span></span>
        <span>Mastered: <span id="mastered-count" style="color:#fff;">0</span></span>
    </div>

    <div class="vault-grid" id="vault-grid">
        </div>

    <footer class="sys-footer">
        &copy; <span id="current-year"></span> NOVA. ALL RIGHTS RESERVED. CREATED BY MANMATH.
    </footer>

    <nav>
        <a href="index.html" class="nav-item">Hub</a>
        <a href="forge.html" class="nav-item">Forge</a>
        <a href="#" class="nav-item active">Vault</a>
        <a href="pulse.html" class="nav-item">Pulse</a>
    </nav>

    <script>
        function loadVault() {
            const grid = document.getElementById('vault-grid');
            let deck = JSON.parse(localStorage.getItem('catalyst_deck')) || [];
            
            // Update Stats
            document.getElementById('total-count').innerText = deck.length;
            document.getElementById('mastered-count').innerText = deck.filter(c => c.mastered).length;

            // Handle Empty State
            if (deck.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>Vault is Empty</h3>
                        <p>You haven't forged any concepts yet. Head over to the Forge to build your deck.</p>
                        <a href="forge.html" class="btn-outline">Go to Forge</a>
                    </div>
                `;
                return;
            }

            // Render Cards (Newest first)
            grid.innerHTML = deck.reverse().map(card => `
                <div class="vault-card" id="card-${card.id}">
                    <div class="card-header">
                        <span class="tag">${card.subject}</span>
                        <button class="btn-delete" onclick="deleteCard(${card.id})">DEL</button>
                    </div>
                    <div class="concept">${card.q}</div>
                    <div class="explanation">${card.a}</div>
                </div>
            `).join('');
        }

        function deleteCard(id) {
            let deck = JSON.parse(localStorage.getItem('catalyst_deck')) || [];
            deck = deck.filter(card => card.id !== id);
            localStorage.setItem('catalyst_deck', JSON.stringify(deck));
            loadVault(); // Re-render
        }

        // Initialize on load
        window.onload = loadVault;

        document.getElementById('current-year').innerText = new Date().getFullYear();
    </script>
</body>
</html>
